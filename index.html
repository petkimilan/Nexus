<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS SyncBoard - Ügyfélkapcsolati Dashboard</title>
    <!-- Google Fonts & Tailwind CSS CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Compat SDKs (Könnyű CDN használat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        /* Egyedi finomhangolások és animációk */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .text-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0d9488;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- IKONOK (Inline SVG-k a maximális kompatibilitásért) ---
        const Icons = {
            Plus: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" />
                </svg>
            ),
            Trash: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" />
                </svg>
            ),
            Check: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
                </svg>
            ),
            ExternalLink: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
                    <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z" />
                </svg>
            ),
            Info: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-teal-400" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zm-1 9a1 1 0 100-2v-3a1 1 0 00-1-1H9a1 1 0 100 2v3a1 1 0 001 1h1z" clipRule="evenodd" />
                </svg>
            ),
            Settings: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0" />
                </svg>
            ),
            Database: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                </svg>
            )
        };

        // --- KEZDETI STATIKUS ALAPADATOK ---
        const INITIAL_DASHBOARD_STATE = {
            kpis: {
                mainGoal: "Q3 Értékesítési árbevétel növelés",
                metricName: "ROAS (Hirdetési megtérülés)",
                target: 4.5,
                current: 3.8,
                unit: "x",
                notes: "Fő fókusz a kosárérték növelésén és a remarketing kampányokon van."
            },
            timeline: [
                { id: 't1', month: 6, title: 'Nyári kampányok indítása', type: 'agency', desc: 'Nyári leárazás és új kreatív szettek élesítése.' },
                { id: 't2', month: 8, title: 'Black Friday előkészületek', type: 'joint', desc: 'Ajánlatok véglegesítése és landolók felépítése.' },
                { id: 't3', month: 10, title: 'Karácsonyi kampányok indítása', type: 'agency', desc: 'Szezonális kreatívok és megemelt büdzsék.' }
            ],
            tasks: [
                { id: 'task-1', title: 'Új Meta kreatív koncepciók jóváhagyása', assignee: 'client', dueDate: '2026-07-20', notes: 'Figma linket elküldtük emailben, a videós teszteké a fókusz.', completed: false },
                { id: 'task-2', title: 'CAPI (Facebook Conversions API) javítása', assignee: 'agency', dueDate: '2026-07-18', notes: 'Szerveroldali események finomhangolása.', completed: true },
                { id: 'task-3', title: 'Bestseller terméklista frissítése', assignee: 'client', dueDate: '2026-07-22', notes: 'Hogy kiszűrjük az elfogyott termékeket a katalógusból.', completed: false },
                { id: 'task-4', title: 'Heti riportálás és optimalizálási javaslatok', assignee: 'agency', dueDate: '2026-07-24', notes: 'Heti statisztikák kiértékelése.', completed: false }
            ],
            creatives: {
                best: {
                    title: "UGC Videó - Unboxing & Vélemény",
                    url: "https://www.facebook.com/ads/library/?id=best_creative_mock",
                    imageUrl: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=600&q=80",
                    ctr: 3.42,
                    roas: 5.1,
                    conclusions: "Az influencer videó 3x több konverziót hozott, mint a stúdiófotók.",
                    recommendations: "További 3 hasonló stílusú UGC videó tesztelése eltérő horgokkal."
                },
                worst: {
                    title: "Statikus Akciós Banner (Grafika)",
                    url: "https://www.facebook.com/ads/library/?id=worst_creative_mock",
                    imageUrl: "https://images.unsplash.com/photo-1531403009284-440f080d1e12?auto=format&fit=crop&w=600&q=80",
                    ctr: 0.85,
                    roas: 1.2,
                    conclusions: "A túlzsúfolt szöveg miatt a hirdetés banner-vakság áldozata lett.",
                    recommendations: "Azonnali leállítás. Helyette termékfókuszú carousel formátum tesztelése."
                }
            },
            agenda: [
                { id: 'ag-1', text: 'Q3 költségkeret átcsoportosítása a legjobban teljesítő célközönségekre', completed: false },
                { id: 'ag-2', text: 'Új termékbevezetési ütemterv egyeztetése (Őszi kollekció)', completed: false },
                { id: 'ag-3', text: 'Kreatív gyártási folyamat felgyorsítása az ügyféllel', completed: false }
            ]
        };

        const MONTHS = [
            "Január", "Február", "Március", "Április", "Május", "Június",
            "Július", "Augusztus", "Szeptember", "Október", "November", "December"
        ];

        // --- STREAMING_CHUNK: Setting up React application component and state management... ---
        function App() {
            const [dbState, setDbState] = useState(INITIAL_DASHBOARD_STATE);
            const [loading, setLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState("checking"); // 'checking', 'local', 'cloud', 'error'
            const [user, setUser] = useState(null);
            
            // Értesítés (toast) kezelő az alert() helyett
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const showToast = (message, type = "info") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 4000);
            };

            // Custom Firebase config state
            const [customFirebaseConfig, setCustomFirebaseConfig] = useState(() => {
                const saved = localStorage.getItem('nexus_custom_firebase_config');
                return saved ? JSON.parse(saved) : null;
            });
            const [showConfigModal, setShowConfigModal] = useState(false);
            const [tempConfigJson, setTempConfigJson] = useState("");

            // Form beviteli mezők
            const [newTimelineEvent, setNewTimelineEvent] = useState({ month: 6, title: '', type: 'agency', desc: '' });
            const [newFocusTask, setNewFocusTask] = useState({ title: '', assignee: 'agency', dueDate: '', notes: '' });
            const [newAgendaItem, setNewAgendaItem] = useState("");

            // Feladat szűrő
            const [taskFilter, setTaskFilter] = useState("all"); // 'all', 'agency', 'client', 'completed'

            // --- STREAMING_CHUNK: Implementing state synchronization and Firebase compatibility... ---
            // Firebase inicializáció
            useEffect(() => {
                let unsubscribeSnap = null;
                let isMounted = true;

                const setupFirebase = async () => {
                    if (!customFirebaseConfig) {
                        // Ha nincs Firebase, LocalStorage-ból töltünk be
                        const localData = localStorage.getItem(`nexus_syncboard_state`);
                        if (localData) {
                            try {
                                setDbState(JSON.parse(localData));
                            } catch (e) {
                                console.error("Hiba a helyi adatok betöltésekor:", e);
                            }
                        }
                        if (isMounted) {
                            setSyncStatus("local");
                            setLoading(false);
                        }
                        return;
                    }

                    try {
                        // Ha létezik korábbi app inicializáció, elkerüljük az ütközést
                        let app;
                        if (!firebase.apps.length) {
                            app = firebase.initializeApp(customFirebaseConfig);
                        } else {
                            app = firebase.app();
                        }
                        
                        const db = firebase.firestore(app);
                        const auth = firebase.auth(app);

                        // Névtelen bejelentkezés a biztonságos Firestore eléréshez
                        await auth.signInAnonymously();

                        auth.onAuthStateChanged((currentUser) => {
                            if (!isMounted) return;
                            setUser(currentUser);

                            if (currentUser) {
                                // Egyedi dokumentum az adatoknak a felhőben
                                const docRef = db.collection('nexus_marketing').doc('global_board_state');
                                
                                unsubscribeSnap = docRef.onSnapshot(
                                    (docSnap) => {
                                        if (docSnap.exists()) {
                                            setDbState(docSnap.data());
                                        } else {
                                            // Első futtatásnál feltöltjük a mintát
                                            docRef.set(INITIAL_DASHBOARD_STATE);
                                            setDbState(INITIAL_DASHBOARD_STATE);
                                        }
                                        setSyncStatus("cloud");
                                        setLoading(false);
                                    },
                                    (error) => {
                                        console.error("Firestore hiba:", error);
                                        setSyncStatus("error");
                                        setLoading(false);
                                    }
                                );
                            } else {
                                setSyncStatus("local");
                                setLoading(false);
                            }
                        });

                    } catch (err) {
                        console.error("Firebase hiba:", err);
                        if (isMounted) {
                            setSyncStatus("error");
                            setLoading(false);
                        }
                    }
                };

                setupFirebase();

                return () => {
                    isMounted = false;
                    if (unsubscribeSnap) unsubscribeSnap();
                };
            }, [customFirebaseConfig]);

            // Mentés kezelő
            const saveState = async (updatedState) => {
                setDbState(updatedState);
                localStorage.setItem(`nexus_syncboard_state`, JSON.stringify(updatedState));

                if (syncStatus === "cloud" && customFirebaseConfig) {
                    try {
                        const db = firebase.firestore();
                        await db.collection('nexus_marketing').doc('global_board_state').set(updatedState);
                    } catch (error) {
                        console.error("Hiba a felhőbe való mentéskor:", error);
                        setSyncStatus("error");
                    }
                }
            };

            // --- AKCIÓK / MODOSÍTÁSOK ---
            const handleSaveCustomConfig = () => {
                try {
                    if (!tempConfigJson.trim()) {
                        localStorage.removeItem('nexus_custom_firebase_config');
                        setCustomFirebaseConfig(null);
                        setShowConfigModal(false);
                        showToast("Visszaállítva helyi offline módra!", "info");
                        return;
                    }
                    const parsed = JSON.parse(tempConfigJson);
                    localStorage.setItem('nexus_custom_firebase_config', JSON.stringify(parsed));
                    setCustomFirebaseConfig(parsed);
                    setShowConfigModal(false);
                    showToast("Saját adatbázis sikeresen összekapcsolva!", "success");
                } catch (e) {
                    showToast("Érvénytelen JSON formátum! Kérlek ellenőrizd a kódot.", "error");
                }
            };

            const handleKpiChange = (field, value) => {
                const updated = {
                    ...dbState,
                    kpis: { ...dbState.kpis, [field]: value }
                };
                saveState(updated);
            };

            const handleAddTimelineEvent = (e) => {
                e.preventDefault();
                if (!newTimelineEvent.title.trim()) return;
                const newEvent = { id: 't-' + Date.now(), ...newTimelineEvent };
                const updated = { ...dbState, timeline: [...dbState.timeline, newEvent] };
                saveState(updated);
                setNewTimelineEvent({ month: 6, title: '', type: 'agency', desc: '' });
                showToast("Új esemény hozzáadva a timeline-hoz!", "success");
            };

            const handleDeleteTimelineEvent = (id) => {
                const updated = { ...dbState, timeline: dbState.timeline.filter(item => item.id !== id) };
                saveState(updated);
                showToast("Esemény törölve.", "info");
            };

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newFocusTask.title.trim()) return;
                const newTask = {
                    id: 'task-' + Date.now(),
                    title: newFocusTask.title,
                    assignee: newFocusTask.assignee,
                    dueDate: newFocusTask.dueDate || new Date().toISOString().split('T')[0],
                    notes: newFocusTask.notes,
                    completed: false
                };
                const updated = { ...dbState, tasks: [...dbState.tasks, newTask] };
                saveState(updated);
                setNewFocusTask({ title: '', assignee: 'agency', dueDate: '', notes: '' });
                showToast("Új feladat rögzítve!", "success");
            };

            const handleToggleTask = (id) => {
                const updatedTasks = dbState.tasks.map(task => {
                    if (task.id === id) {
                        const nextStatus = !task.completed;
                        showToast(nextStatus ? "Feladat elvégezve! Graulálunk! 🎉" : "Feladat újra megnyitva.", "info");
                        return { ...task, completed: nextStatus };
                    }
                    return task;
                });
                saveState({ ...dbState, tasks: updatedTasks });
            };

            const handleDeleteTask = (id) => {
                const updated = { ...dbState, tasks: dbState.tasks.filter(t => t.id !== id) };
                saveState(updated);
                showToast("Feladat törölve.", "info");
            };

            const handleCreativeChange = (type, field, value) => {
                const updated = {
                    ...dbState,
                    creatives: {
                        ...dbState.creatives,
                        [type]: { ...dbState.creatives[type], [field]: value }
                    }
                };
                saveState(updated);
            };

            const handleAddAgendaItem = (e) => {
                e.preventDefault();
                if (!newAgendaItem.trim()) return;
                const newItem = { id: 'ag-' + Date.now(), text: newAgendaItem, completed: false };
                const updated = { ...dbState, agenda: [...dbState.agenda, newItem] };
                saveState(updated);
                setNewAgendaItem("");
                showToast("Napirendi pont hozzáadva a listához!", "success");
            };

            const handleToggleAgendaItem = (id) => {
                const updatedAgenda = dbState.agenda.map(item => {
                    if (item.id === id) return { ...item, completed: !item.completed };
                    return item;
                });
                saveState({ ...dbState, agenda: updatedAgenda });
            };

            const handleDeleteAgendaItem = (id) => {
                const updated = { ...dbState, agenda: dbState.agenda.filter(item => item.id !== id) };
                saveState(updated);
                showToast("Napirendi pont törölve.", "info");
            };

            const filteredTasks = useMemo(() => {
                return dbState.tasks.filter(task => {
                    if (taskFilter === "all") return true;
                    if (taskFilter === "agency") return task.assignee === "agency" && !task.completed;
                    if (taskFilter === "client") return task.assignee === "client" && !task.completed;
                    if (taskFilter === "completed") return task.completed;
                    return true;
                });
            }, [dbState.tasks, taskFilter]);

            const yearProgressPercent = useMemo(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), 0, 1);
                const diff = now - start;
                const oneDay = 1000 * 60 * 60 * 24;
                const dayOfYear = Math.floor(diff / oneDay);
                return Math.min(100, Math.max(0, Math.round((dayOfYear / 365) * 100)));
            }, []);

            return (
                <div className="pb-20">
                    {/* TOAST PANEL */}
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 z-50 flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 animate-fadeIn ${
                            toast.type === 'success' ? 'bg-teal-950 border-teal-500 text-teal-200' :
                            toast.type === 'error' ? 'bg-rose-950 border-rose-500 text-rose-200' :
                            'bg-slate-900 border-slate-700 text-slate-200'
                        }`}>
                            <span className="text-sm font-bold">{toast.message}</span>
                        </div>
                    )}

                    {/* FEJLÉC */}
                    <header className="border-b border-slate-800 bg-slate-950/90 backdrop-blur-md sticky top-0 z-30">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-fuchsia-600 to-teal-400 flex items-center justify-center shadow-lg shadow-teal-500/15">
                                    <span className="font-extrabold text-slate-950 text-xl text-display">N</span>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-teal-400 via-fuchsia-400 to-fuchsia-500 bg-clip-text text-transparent text-display">
                                        NEXUS SYNCBOARD
                                    </h1>
                                    <p className="text-[11px] text-slate-400 font-medium tracking-wide uppercase">Transzparens Ügyfél Együttműködés</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                {/* Státusz jelző */}
                                <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold border ${
                                    syncStatus === 'cloud' ? 'bg-teal-500/10 border-teal-500/30 text-teal-400' :
                                    syncStatus === 'local' ? 'bg-amber-500/10 border-amber-500/30 text-amber-400' :
                                    'bg-rose-500/10 border-rose-500/30 text-rose-400'
                                }`}>
                                    <span className={`w-2 h-2 rounded-full ${syncStatus === 'cloud' ? 'bg-teal-400 animate-pulse' : syncStatus === 'local' ? 'bg-amber-400' : 'bg-rose-400'}`} />
                                    {syncStatus === 'cloud' ? 'Valós idejű Felhő aktív' : syncStatus === 'local' ? 'Helyi böngésző mentés' : 'Kapcsolódási hiba'}
                                </div>

                                {/* Adatbázis Beállítás */}
                                <button 
                                    onClick={() => {
                                        setTempConfigJson(customFirebaseConfig ? JSON.stringify(customFirebaseConfig, null, 2) : "");
                                        setShowConfigModal(true);
                                    }}
                                    className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-900 hover:bg-slate-800 transition border border-slate-800 text-slate-300"
                                >
                                    <Icons.Database />
                                    <span>Adatbázis</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* FŐ TARTALOM */}
                    <main className="max-w-7xl mx-auto px-4 mt-8 space-y-8">
                        
                        {/* --- STREAMING_CHUNK: Building the strategic annual timeline visualizer... --- */}
                        {/* 1. SZEKCIÓ: ÉVES TIMELINE & KPI */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            
                            {/* KPI - CÉLTÁBLA */}

                                                        className="bg-transparent text-emerald-400 font-bold font-mono text-center w-full focus:outline-none"
                                                    />
                                                </div>
                                                <div>
                                                    <span className="text-[8px] text-slate-400 font-bold block uppercase">ROAS</span>

                                                        type="number"

                                                        className="bg-transparent text-emerald-400 font-bold font-mono text-center w-full focus:outline-none"

                                            </div>

                                            <div className="space-y-1">
                                                <label className="block text-[8px] text-emerald-400 uppercase font-black">Eredmény / Tanulság</label>

                                                <textarea
                                                    rows="2"

                                                    className="w-full bg-slate-900/40 border border-slate-800 rounded p-1.5 text-xs text-slate-300 resize-none focus:outline-none"

                                                    type="text"

                                                    onChange={(e) => handleCreativeChange('worst', 'title', e.target.value)}

                                                    type="text"
                                                    placeholder="Kép URL..."
                                                    value={dbState.creatives.worst.imageUrl}

                                                    href={dbState.creatives.worst.url}

                                                    <span className="text-[8px] text-slate-400 font-bold block uppercase">CTR (%)</span>

                                                <div>
                                                    <span className="text-[8px] text-slate-400 font-bold block uppercase">ROAS</span>

                                                        type="number"
                                                        step="0.1"
                                                        value={dbState.creatives.worst.roas}

                                                        className="bg-transparent text-rose-400 font-bold font-mono text-center w-full focus:outline-none"
                                                    />
                                                </div>
                                            </div>

                                                <label className="block text-[8px] text-rose-400 uppercase font-black">Miért nem működött?</label>

                                                    rows="2"
                                                    value={dbState.creatives.worst.conclusions}
                                                    onChange={(e) => handleCreativeChange('worst', 'conclusions', e.target.value)}

                                                />
                                                <label className="block text-[8px] text-rose-400 uppercase font-black">Mit változtatunk?</label>
                                                <textarea
                                                    rows="2"
                                                    value={dbState.creatives.worst.recommendations}
                                                    onChange={(e) => handleCreativeChange('worst', 'recommendations', e.target.value)}

                                                />

                                        </div>
                                    </div>

                                </div>

                                <div>

                                                        item.completed

                                                            : 'bg-slate-950/65 border-slate-800/80 hover:border-slate-700'
                                                    }`}

                                                    <div className="flex items-start gap-2.5 flex-1">
                                                        <button
                                                            onClick={() => handleToggleAgendaItem(item.id)}
                                                            className={`mt-0.5 w-4 h-4 rounded border flex items-center justify-center transition-all ${
                                                                item.completed

                                                                    : 'border-slate-700 hover:border-fuchsia-400 text-transparent'
                                                            }`}
                                                        >
                                                            <Icons.Check />
                                                        </button>
                                                        <span className="text-xs leading-relaxed text-slate-200">
                                                            {item.text}
                                                        </span>
                                                    </div>
                                                    
                                                    <button 
                                                        onClick={() => handleDeleteAgendaItem(item.id)}

                                                    </button>

                                            type="text"
                                            placeholder="Pl. Karácsonyi büdzsé tervezés..."

                                            onChange={(e) => setNewAgendaItem(e.target.value)}

                                            type="submit"
                                            className="bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold p-1.5 rounded-lg transition"

                    {/* --- STREAMING_CHUNK: Structuring database configuration modals and user notifications... --- */}
                    {/* SAJÁT FIREBASE MODAL */}
                    {showConfigModal && (

                                        <Icons.Database />

                                    </h3>
                                    <button 
                                        onClick={() => setShowConfigModal(false)}
                                        className="text-slate-400 hover:text-white font-bold text-sm"
                                    >
                                        ✕
                                    </button>

                                <div className="p-5 space-y-4">
                                    <p className="text-xs text-slate-400 leading-relaxed">

                                    </p>

                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-300 mb-1">
                                            Firebase Config (JSON formátum)
                                        </label>
                                        <textarea
                                            rows="8"
                                            value={tempConfigJson}
                                            onChange={(e) => setTempConfigJson(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-[10px] font-mono text-teal-400 focus:border-teal-400"
                                            placeholder={`{\n  "apiKey": "AIzaSy...",\n  "authDomain": "...",\n  "projectId": "...",\n  "storageBucket": "...",\n  "messagingSenderId": "...",\n  "appId": "..."\n}`}
                                        />
                                    </div>

                                    <div className="bg-slate-950/60 p-3 rounded-lg border border-slate-800 flex gap-2">
                                        <Icons.Info />
                                        <div className="text-[10px] text-slate-400">
                                            <p className="font-semibold text-slate-200">Biztonságos tárolás:</p>
                                            <p>A konfigurációt a te saját böngésződ rögzíti biztonságosan. Ha üresen hagyod és elmented, visszaállsz helyi offline tárolásra.</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-5 bg-slate-950/60 border-t border-slate-850 flex justify-end gap-3">
                                    <button
                                        onClick={() => {
                                            localStorage.removeItem('nexus_custom_firebase_config');
                                            setCustomFirebaseConfig(null);
                                            setShowConfigModal(false);
                                            showToast("Saját adatbázis törölve.", "info");
                                        }}
                                        className="px-3 py-2 rounded-lg text-xs font-bold text-rose-400 hover:bg-rose-500/10 transition"
                                    >
                                        Beállítások törlése
                                    </button>
                                    <button
                                        onClick={handleSaveCustomConfig}
                                        className="px-4 py-2 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-slate-950 font-bold rounded-lg text-xs transition"
                                    >
                                        Kapcsolódás
                                    </button>
                                </div>
                            </div>
                        </div>

                </div>
            );
        }

        // --- STREAMING_CHUNK: Mounting React application to the DOM root... ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
