        // Szigorú tömbbé alakító a Firebase Realtime Database objektum-tömb anomáliáira
        const firebaseArrayToArray = (val) => {
            if (!val) return [];
            if (Array.isArray(val)) return val.filter(Boolean);
            if (typeof val === 'object') {
                return Object.keys(val)
                    .sort((a, b) => Number(a) - Number(b))
                    .map(key => val[key])
                    .filter(Boolean);
            }
            return [];
        };

        const safeParseState = (value) => {
            if (!value) return INITIAL_DASHBOARD_STATE;
            return {
                clientName: value.clientName || INITIAL_DASHBOARD_STATE.clientName,
                driveLink: value.driveLink || INITIAL_DASHBOARD_STATE.driveLink,
                kpis: {
                    mainGoal: value.kpis?.mainGoal || "",
                    metricName: value.kpis?.metricName || "",
                    target: Number(value.kpis?.target ?? 0),
                    current: Number(value.kpis?.current ?? 0),
                    unit: value.kpis?.unit || "x",
                    notes: value.kpis?.notes || ""
                },
                completedKpis: firebaseArrayToArray(value.completedKpis),
                timeline: firebaseArrayToArray(value.timeline).map(t => ({
                    id: t.id,
                    month: Number(t.month ?? 6),
                    title: t.title || "",
                    type: t.type || "agency",
                    desc: t.desc || "",
                    assignee: t.assignee || ""
                })),

                    id: t.id,
                    title: t.title || "",
                    assignee: t.assignee || "",
                    dueDate: t.dueDate || "",
                    notes: t.notes || "",
                    completed: !!t.completed
                })),
                creatives: {

                        roas: Number(value.creatives?.best?.roas ?? 0),
                        conclusions: value.creatives?.best?.conclusions || "",
                        recommendations: value.creatives?.best?.recommendations || ""
                    },
                    worst: {
                        title: value.creatives?.worst?.title || "",

                        accessToken: value.creatives?.worst?.accessToken || "",
                        adFormat: value.creatives?.worst?.adFormat || "MOBILE_FEED_STANDARD",
                        ctr: Number(value.creatives?.worst?.ctr ?? 0),
                        roas: Number(value.creatives?.worst?.roas ?? 0),
                        conclusions: value.creatives?.worst?.conclusions || "",

                    text: a.text || "",
                    completed: !!a.completed
                })),

                    googleAds: value.monthlyAnalysis?.googleAds || "",

        function App() {
            const [dbState, setDbState] = useState(INITIAL_DASHBOARD_STATE);
            const [loading, setLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState("checking");
            const [firebaseError, setFirebaseError] = useState("");
            
            // UI szerkesztési módok
            const [isEditingClient, setIsEditingClient] = useState(false);
            const [isEditingDrive, setIsEditingDrive] = useState(false);
            
            // Útmutató harmonika állapota
            const [showAdGuide, setShowAdGuide] = useState(false);
            
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const showToast = (message, type = "info") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3000);
            };

            // Input stégek
            const [newTimelineEvent, setNewTimelineEvent] = useState({ month: 6, title: '', type: 'agency', desc: '', assignee: '' });
            const [newFocusTask, setNewFocusTask] = useState({ title: '', assignee: '', dueDate: '', notes: '' });
            const [newAgendaItem, setNewAgendaItem] = useState("");
            
            // Heti fókusz szűrők
            const [taskFilter, setTaskFilter] = useState("all");
            const [taskSearchAssignee, setTaskSearchAssignee] = useState("");

            // Dinamikus Open Graph link preview adatok (Microlink API alapon)
            const [bestOgPreview, setBestOgPreview] = useState(null);
            const [worstOgPreview, setWorstOgPreview] = useState(null);

            useEffect(() => {
                let isMounted = true;
                let timeoutId = null;

                const fallbackToLocalStorage = () => {
                    const localData = localStorage.getItem(`nexus_syncboard_state`);
                    if (localData) {
                        try {
                            setDbState(safeParseState(JSON.parse(localData)));
                        } catch (e) {
                            console.error("Hiba a helyi adatok betöltésekor:", e);
                        }
                    }
                    if (isMounted) {
                        setSyncStatus("local");
                        setLoading(false);
                    }
                };

                timeoutId = setTimeout(() => {
                    if (isMounted && loading) {
                        setFirebaseError("Időtúllépés. A Firebase Realtime Database nem válaszolt.");
                        fallbackToLocalStorage();
                    }
                }, 6000);

                const setupFirebase = async () => {
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(FIREBASE_CONFIG);
                        }
                        
                        const db = firebase.database();
                        const auth = firebase.auth();

                        await auth.signInAnonymously();

                        auth.onAuthStateChanged((currentUser) => {
                            if (!isMounted) return;

                            if (currentUser) {
                                const dbRef = db.ref('nexus_marketing/global_syncboard_state');
                                
                                dbRef.on('value', 
                                    (snapshot) => {
                                        if (timeoutId) clearTimeout(timeoutId);
                                        const value = snapshot.val();
                                        if (value) {
                                            setDbState(safeParseState(value));
                                        } else {
                                            dbRef.set(INITIAL_DASHBOARD_STATE).catch(err => {
                                                setFirebaseError("Adatbázis írás megtagadva (Permission Denied).");
                                            });
                                            setDbState(INITIAL_DASHBOARD_STATE);
                                        }
                                        if (isMounted) {
                                            setSyncStatus("cloud");
                                            setLoading(false);
                                        }
                                    },
                                    (error) => {
                                        if (timeoutId) clearTimeout(timeoutId);
                                        setFirebaseError("Adatbázis hiba: " + error.message);
                                        fallbackToLocalStorage();
                                    }
                                );
                            } else {
                                if (timeoutId) clearTimeout(timeoutId);
                                fallbackToLocalStorage();
                            }
                        });

                    } catch (err) {
                        if (timeoutId) clearTimeout(timeoutId);
                        setFirebaseError("Inicializálási hiba: " + err.message);
                        fallbackToLocalStorage();
                    }
                };

                setupFirebase();

                return () => {
                    isMounted = false;
                    if (timeoutId) clearTimeout(timeoutId);
                };
            }, []);

            // Best Creative Open Graph betöltő
            useEffect(() => {
                const fetchOg = async () => {
                    const url = dbState.creatives?.best?.url;
                    if (!url || !url.startsWith("http")) {
                        setBestOgPreview(null);
                        return;
                    }
                    try {
                        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                        if (res.ok) {
                            const json = await res.json();
                            if (json.status === "success" && json.data) {
                                setBestOgPreview({
                                    title: json.data.title || "",
                                    description: json.data.description || "",
                                    image: json.data.image?.url || json.data.logo?.url || "",
                                    publisher: json.data.publisher || ""
                                });
                            }
                        }
                    } catch (e) {
                        console.error("Nem sikerült lekérni a Meta hirdetés Open Graph adatait", e);
                    }
                };
                fetchOg();
            }, [dbState.creatives?.best?.url]);

            // Worst Creative Open Graph betöltő
            useEffect(() => {
                const fetchOg = async () => {
                    const url = dbState.creatives?.worst?.url;
                    if (!url || !url.startsWith("http")) {
                        setWorstOgPreview(null);
                        return;
                    }
                    try {
                        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                        if (res.ok) {
                            const json = await res.json();
                            if (json.status === "success" && json.data) {
                                setWorstOgPreview({
                                    title: json.data.title || "",
                                    description: json.data.description || "",
                                    image: json.data.image?.url || json.data.logo?.url || "",
                                    publisher: json.data.publisher || ""
                                });
                            }
                        }
                    } catch (e) {
                        console.error("Nem sikerült lekérni a Meta hirdetés Open Graph adatait", e);
                    }
                };
                fetchOg();
            }, [dbState.creatives?.worst?.url]);

            const saveState = async (updatedState) => {
                setDbState(updatedState);
                localStorage.setItem(`nexus_syncboard_state`, JSON.stringify(updatedState));

                if (syncStatus === "cloud") {
                    try {
                        const db = firebase.database();
                        await db.ref('nexus_marketing/global_syncboard_state').set(updatedState);
                    } catch (error) {
                        console.error("Hiba a felhőbe történő mentéskor:", error);
                        showToast("Mentési hiba! Átmenetileg offline mód.", "error");
                        setSyncStatus("local");
                    }
                }
            };

            const handleUpdateClientName = (name) => {
                saveState({ ...dbState, clientName: name });
            };

            const handleUpdateDriveLink = (link) => {
                saveState({ ...dbState, driveLink: link });
            };

            const handleKpiChange = (field, value) => {
                const updated = {
                    ...dbState,
                    kpis: { ...dbState.kpis, [field]: value }
                };
                saveState(updated);
            };

            // JAVÍTOTT ÉS TESZTELT "TELJESÜLT" KPI KEZELÉS (Archiválás és teljes mező kiürítés)
            const handleCompleteKpi = () => {
                if (!dbState.kpis.mainGoal || !dbState.kpis.mainGoal.trim()) {
                    showToast("Nincs rögzített fókusz cél amit teljesítetté tehetnél!", "error");
                    return;
                }
                const completedGoal = {
                    id: 'kpi-' + Date.now(),
                    mainGoal: dbState.kpis.mainGoal,
                    metricName: dbState.kpis.metricName || "",
                    target: dbState.kpis.target || 0,
                    current: dbState.kpis.current || 0,
                    unit: dbState.kpis.unit || "",
                    completedAt: new Date().toLocaleDateString('hu-HU')
                };

                const updated = {
                    ...dbState,
                    completedKpis: [completedGoal, ...firebaseArrayToArray(dbState.completedKpis)],
                    kpis: {
                        mainGoal: "",
                        metricName: "",
                        target: 0,
                        current: 0,
                        unit: "x",
                        notes: ""
                    }
                };
                saveState(updated);
                showToast("Gratulálunk! A cél archiválva a teljesített célok közé! 🏆", "success");
            };

            const handleDeleteCompletedKpi = (id) => {
                const updated = {
                    ...dbState,
                    completedKpis: dbState.completedKpis.filter(k => k.id !== id)
                };
                saveState(updated);
                showToast("Teljesített cél törölve a történelmi listából.", "info");
            };

            const handleAddTimelineEvent = (e) => {
                e.preventDefault();
                if (!newTimelineEvent.title.trim()) return;
                const newEvent = { id: 't-' + Date.now(), ...newTimelineEvent };
                const updated = { ...dbState, timeline: [...dbState.timeline, newEvent] };
                saveState(updated);
                setNewTimelineEvent({ month: 6, title: '', type: 'agency', desc: '', assignee: '' });
                showToast("Mérföldkő hozzáadva a timeline-hoz!", "success");
            };

            const handleDeleteTimelineEvent = (id) => {
                const updated = { ...dbState, timeline: dbState.timeline.filter(item => item.id !== id) };
                saveState(updated);
                showToast("Mérföldkő törölve.", "info");
            };

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newFocusTask.title.trim()) return;
                const newTask = {
                    id: 'task-' + Date.now(),
                    title: newFocusTask.title,
                    assignee: newFocusTask.assignee || "Nincs megadva",
                    dueDate: newFocusTask.dueDate || new Date().toISOString().split('T')[0],
                    notes: newFocusTask.notes,
                    completed: false
                };
                const updated = { ...dbState, tasks: [...dbState.tasks, newTask] };
                saveState(updated);
                setNewFocusTask({ title: '', assignee: '', dueDate: '', notes: '' });
                showToast("Új feladat hozzáadva a listához!", "success");
            };

            const handleToggleTask = (id) => {
                const updatedTasks = dbState.tasks.map(task => {
                    if (task.id === id) {
                        const nextStatus = !task.completed;
                        showToast(nextStatus ? "Feladat teljesítve! 🎉" : "Feladat visszanyitva.", "info");
                        return { ...task, completed: nextStatus };
                    }
                    return task;
                });
                saveState({ ...dbState, tasks: updatedTasks });
            };

            const handleDeleteTask = (id) => {
                const updated = { ...dbState, tasks: dbState.tasks.filter(t => t.id !== id) };
                saveState(updated);
                showToast("Feladat törölve.", "info");
            };

            const handleCreativeChange = (type, field, value) => {
                const updated = {
                    ...dbState,
                    creatives: {
                        ...dbState.creatives,
                        [type]: { ...dbState.creatives[type], [field]: value }
                    }
                };
                saveState(updated);
            };

            const handleAddAgendaItem = (e) => {
                e.preventDefault();
                if (!newAgendaItem.trim()) return;
                const newItem = { id: 'ag-' + Date.now(), text: newAgendaItem, completed: false };
                const updated = { ...dbState, agenda: [...dbState.agenda, newItem] };
                saveState(updated);
                setNewAgendaItem("");
                showToast("Új napirendi pont rögzítve!", "success");
            };

            const handleToggleAgendaItem = (id) => {
                const updatedAgenda = dbState.agenda.map(item => {
                    if (item.id === id) return { ...item, completed: !item.completed };
                    return item;
                });
                saveState({ ...dbState, agenda: updatedAgenda });
            };

            const handleDeleteAgendaItem = (id) => {
                const updated = { ...dbState, agenda: dbState.agenda.filter(item => item.id !== id) };
                saveState(updated);
                showToast("Napirendi pont törölve.", "info");
            };

            const handleMonthlyAnalysisChange = (field, value) => {
                const updated = {
                    ...dbState,
                    monthlyAnalysis: {
                        ...dbState.monthlyAnalysis,
                        [field]: value
                    }
                };
                saveState(updated);
            };

            // --- JAVÍTOTT ÉS TESZTELT GOLYÓÁLLÓ SZŰRÉS KÖZVETLENÜL A RENDER FÁZISBAN ---
            const filteredTasks = useMemo(() => {
                return (dbState.tasks || []).filter(task => {
                    const isTaskCompleted = !!task.completed;
                    
                    if (taskFilter === "active" && isTaskCompleted) return false;
                    if (taskFilter === "completed" && !isTaskCompleted) return false;
                    
                    if (taskSearchAssignee && taskSearchAssignee.trim() !== "") {
                        const target = (task.assignee || "").toLowerCase();
                        const query = taskSearchAssignee.toLowerCase();
                        if (!target.includes(query)) return false;
                    }
                    return true;
                });
            }, [dbState.tasks, taskFilter, taskSearchAssignee]);

            const yearProgressPercent = useMemo(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), 0, 1);
                const diff = now - start;
                const oneDay = 1000 * 60 * 60 * 24;
                const dayOfYear = Math.floor(diff / oneDay);
                return Math.min(100, Math.max(0, Math.round((dayOfYear / 365) * 100)));
            }, []);

            // INTELLIGENS MÉDIA ELŐNÉZET LEJÁTSZÓ (Drive, YouTube, Vimeo, mp4 és Meta Ad Preview Plugin támogatással!)
            const renderMediaPreview = (creative, isWorst = false) => {
                // 1. Meta Ad Preview Plugin Iframe beágyazás (Hivatalos Meta API elérés)
                if (creative.previewMode === 'metaPlugin') {
                    const cid = creative.creativeId;
                    const token = creative.accessToken;
                    const format = creative.adFormat || "MOBILE_FEED_STANDARD";
                    if (!cid || !token) {
                        return (
                            <div className="text-center p-6 text-slate-500 flex flex-col items-center justify-center min-h-[180px]">
                                <p className="text-xs font-bold text-cyan-400 mb-1">Meta Ad Preview Plugin</p>
                                <p className="text-[10px] text-slate-400 max-w-[220px]">
                                    A rendereléshez add meg a lenti <b>Creative ID</b>-t és az <b>Access Token</b>-t!
                                </p>
                            </div>
                        );
                    }
                    return (
                        <iframe 
                            src={`https://www.facebook.com/ads/api/creative_preview.php?creative_id=${cid}&access_token=${token}&ad_format=${format}`}
                            className={`w-full h-full rounded-lg border-0 min-h-[220px] bg-slate-950 ${isWorst ? 'filter grayscale' : ''}`}
                            sandbox="allow-scripts allow-same-origin allow-popups"
                        ></iframe>
                    );
                }

                const url = creative.imageUrl;
                if (!url || !url.trim().startsWith("http")) {
                    return (
                        <div className="text-center p-6 text-slate-500 flex flex-col items-center justify-center min-h-[160px]">
                            <div className="text-slate-600 mb-2"><Icons.Video /></div>
                            <p className="text-xs">Nincs videó vagy kép link beillesztve.</p>
                            <p className="text-[10px] text-slate-600 mt-1 max-w-[220px]">
                                Töltsd fel a videót Drive-ra és másold be ide a megosztási linket!
                            </p>
                        </div>
                    );
                }

                // 2. Google Drive videó link átalakítás Iframe lejátszóvá (Nem jár le, stabil!)
                if (url.includes("drive.google.com")) {
                    let fileId = "";
                    const matches = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                    if (matches && matches[1]) {
                        fileId = matches[1];
                        return (
                            <iframe 
                                src={`https://drive.google.com/file/d/${fileId}/preview`} 
                                className={`w-full h-full rounded-lg border-0 min-h-[180px] ${isWorst ? 'filter grayscale' : ''}`}
                                allow="autoplay"
                                allowFullScreen
                            ></iframe>
                        );
                    }
                }

                // 3. YouTube videó beágyazás
                if (url.includes("youtube.com") || url.includes("youtu.be")) {
                    let videoId = "";
                    if (url.includes("youtu.be/")) {
                        videoId = url.split("youtu.be/")[1]?.split("?")[0];
                    } else if (url.includes("v=")) {
                        videoId = url.split("v=")[1]?.split("&")[0];
                    } else if (url.includes("embed/")) {
                        videoId = url.split("embed/")[1]?.split("?")[0];
                    }
                    if (videoId) {
                        return (
                            <iframe 
                                src={`https://www.youtube.com/embed/${videoId}?autoplay=0&mute=1`} 
                                className={`w-full h-full rounded-lg border-0 min-h-[180px] ${isWorst ? 'filter grayscale' : ''}`}
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowFullScreen
                            ></iframe>
                        );
                    }
                }

                // 4. Vimeo videó beágyazás
                if (url.includes("vimeo.com")) {
                    const matches = url.match(/vimeo\.com\/(\d+)/);
                    if (matches && matches[1]) {
                        const videoId = matches[1];
                        return (
                            <iframe 
                                src={`https://player.vimeo.com/video/${videoId}`} 
                                className={`w-full h-full rounded-lg border-0 min-h-[180px] ${isWorst ? 'filter grayscale' : ''}`}
                                allowFullScreen
                            ></iframe>
                        );
                    }
                }

                // 5. Közvetlen mp4/webm fájlok és Dropbox raw streamek
                const isVideo = url.toLowerCase().includes(".mp4") || url.toLowerCase().includes(".webm") || url.includes("fbcdn.net/v/") || (url.includes("dropbox.com") && url.includes("raw=1"));
                if (isVideo) {
                    return (
                        <video 
                            src={url} 
                            className={`w-full h-full object-contain rounded-lg ${isWorst ? 'filter grayscale' : ''}`}
                            controls 
                            autoPlay 
                            loop 
                            muted
                            playsInline
                        />
                    );
                }

                // 6. Alapértelmezett: Képként történő kirajzolás
                return (
                    <img 
                        src={url} 
                        alt="Creative Content" 
                        className={`w-full h-full object-cover rounded-lg ${isWorst ? 'filter grayscale' : ''}`}
                        onError={(e) => { e.target.style.display = 'none'; }}
                    />
                );
            };

            // Open Graph Előnézet Renderelő Függvény (Slack/Facebook stílusú kártya)
            const renderLinkPreviewCard = (preview, fallbackTitle, fallbackUrl) => {
                if (!preview) {
                    return (
                        <div className="flex flex-col items-center justify-center p-6 bg-slate-950/60 rounded-xl border border-slate-800 text-center min-h-[120px]">
                            <div className="w-8 h-8 rounded-full bg-slate-900 flex items-center justify-center text-slate-500 mb-2">
                                <Icons.ExternalLink />
                            </div>
                            <p className="text-[11px] text-slate-500 leading-normal max-w-[200px]">
                                Céloldal vagy hirdetés Open Graph előnézete...
                            </p>
                        </div>
                    );
                }
                return (
                    <div className="bg-slate-950 rounded-xl overflow-hidden border border-slate-800 flex flex-col shadow-lg min-h-[120px]">
                        {preview.image && (
                            <div className="w-full h-32 overflow-hidden border-b border-slate-800/80 relative">
                                <img 
                                    src={preview.image} 
                                    alt={preview.title} 
                                    className="w-full h-full object-cover"
                                    onError={(e) => { e.target.style.display = 'none'; }}
                                />
                            </div>

                        <div className="p-3 flex-1 flex flex-col justify-between">
                            <div>
                                <span className="text-[8px] font-bold text-cyan-400 uppercase tracking-widest block mb-0.5">
                                    {preview.publisher || "LINK PREVIEW"}
                                </span>
                                <h4 className="text-xs font-bold text-slate-100 line-clamp-1">{preview.title || fallbackTitle}</h4>
                                <p className="text-[10px] text-slate-400 line-clamp-2 mt-1 leading-relaxed">{preview.description}</p>
                            </div>
                            <a 
                                href={fallbackUrl} 
                                target="_blank" 
                                rel="noreferrer" 
                                className="inline-flex items-center gap-1.5 text-[9px] font-black text-cyan-400 hover:text-cyan-300 tracking-wider uppercase mt-3 transition-all"
                            >
                                <span>Megnyitás</span>
                                <Icons.ExternalLink />
                            </a>
                        </div>
                    </div>
                );
            };

            return (
                <div className="pb-24">
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 z-50 flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 ${
                            toast.type === 'success' ? 'bg-teal-950 border-teal-500/30 text-teal-200' :
                            toast.type === 'error' ? 'bg-rose-950 border-rose-500/30 text-rose-200' :
                            'bg-slate-900 border-slate-800 text-slate-200'
                        }`}>
                            <span className="text-xs font-bold">{toast.message}</span>
                        </div>
                    )}

                    {/* FELSŐ VEZÉRLŐ ÉS FEJLÉC SZEKCIÓ */}
                    <header className="border-b border-slate-800/80 bg-slate-950/90 backdrop-blur-md sticky top-0 z-40 shadow-2xl">
                        <div className="max-w-7xl mx-auto px-4 py-5 flex flex-col md:flex-row justify-between items-center gap-4">
                            
                            {/* Ügyfél Név és Logó */}
                            <div className="flex items-center gap-4 w-full md:w-auto">
                                <div className="w-12 h-12 rounded-xl bg-gradient-to-tr from-cyan-500 to-fuchsia-500 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                                    <span className="font-extrabold text-slate-950 text-2xl">N</span>
                                </div>
                                <div className="flex-1">
                                    <div className="flex items-center gap-2">
                                        {isEditingClient ? (
                                            <input
                                                type="text"
                                                value={dbState.clientName}
                                                onChange={(e) => handleUpdateClientName(e.target.value)}
                                                onBlur={() => setIsEditingClient(false)}
                                                onKeyDown={(e) => e.key === 'Enter' && setIsEditingClient(false)}
                                                className="bg-slate-900 border border-cyan-500 rounded px-2 py-0.5 text-lg font-bold text-white focus:outline-none"
                                                autoFocus
                                            />
                                        ) : (
                                            <h1 
                                                onClick={() => setIsEditingClient(true)}
                                                className="text-xl font-bold tracking-tight text-white cursor-pointer hover:text-cyan-400 flex items-center gap-2 group"
                                            >
                                                {dbState.clientName || "Kedves Ügyfelünk"}
                                                <span className="text-[10px] text-slate-500 opacity-0 group-hover:opacity-100 transition">Szerkesztés</span>
                                            </h1>
                                        )}
                                    </div>
                                    <p className="text-xs text-slate-400 font-semibold tracking-wider uppercase">Marketing Ügyfél Portál</p>
                                </div>
                            </div>

                            {/* Közös Drive Link és Státuszok */}
                            <div className="flex flex-wrap items-center gap-3 w-full md:w-auto justify-end">
                                <div className="flex items-center gap-2 bg-slate-900/60 p-1 rounded-xl border border-slate-800">
                                    {isEditingDrive ? (
                                        <input
                                            type="text"
                                            value={dbState.driveLink}
                                            onChange={(e) => handleUpdateDriveLink(e.target.value)}
                                            onBlur={() => setIsEditingDrive(false)}
                                            onKeyDown={(e) => e.key === 'Enter' && setIsEditingDrive(false)}
                                            placeholder="Drive mappa linkje..."
                                            className="bg-slate-950 border border-cyan-500 rounded px-2.5 py-1 text-xs text-slate-200 focus:outline-none w-48"
                                            autoFocus
                                        />
                                    ) : (
                                        <button 
                                            onClick={() => { setIsEditingDrive(true); }}
                                            className="px-2.5 py-1 text-slate-400 hover:text-slate-200 text-xs font-semibold"
                                        >
                                            Link beállítása
                                        </button>
                                    )}

                                    <a 
                                        href={dbState.driveLink || "#"} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gradient-to-r from-cyan-500 to-teal-500 text-slate-950 text-xs font-black transition hover:brightness-110 shadow-lg shadow-cyan-500/10"
                                    >
                                        <Icons.Folder />
                                        <span>Közös Drive</span>
                                    </a>
                                </div>

                                <div className={`flex items-center gap-2 px-3.5 py-1.5 rounded-full text-xs font-bold border ${
                                    syncStatus === 'cloud' ? 'bg-teal-500/10 border-teal-500/20 text-teal-400' :
                                    'bg-amber-500/10 border-amber-500/20 text-amber-400'
                                }`}>
                                    <span className={`w-2 h-2 rounded-full ${syncStatus === 'cloud' ? 'bg-teal-400 animate-pulse' : 'bg-amber-400'}`} />
                                    {syncStatus === 'cloud' ? 'Valós idejű RTDB aktív' : 'Helyi mentés'}
                                </div>
                            </div>

                        </div>
                    </header>

                    {/* AZ ÉV HALADÁSA CSÚSZKA */}
                    <div className="max-w-7xl mx-auto px-4 mt-6">
                        <div className="bg-brand-card/50 border border-slate-800/80 rounded-2xl p-4 relative overflow-hidden backdrop-blur-sm shadow-xl">
                            <div className="absolute top-0 right-0 w-32 h-16 bg-cyan-500/5 rounded-full blur-2xl"></div>
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-2.5 gap-1">
                                <span className="text-[10px] font-black uppercase tracking-wider text-cyan-400 flex items-center gap-1.5">
                                    <span className="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-ping"></span>
                                    Aktuális Éves Idővonal Haladás
                                </span>
                                <span className="text-xs font-mono text-fuchsia-400 font-bold bg-slate-950/40 px-2.5 py-1 rounded-lg border border-slate-800/60">

                            <div className="relative w-full h-3 bg-slate-950 rounded-full border border-slate-800/80 overflow-hidden shadow-inner">
                                <div 
                                    className="h-full bg-gradient-to-r from-cyan-500 via-teal-400 to-fuchsia-500 rounded-full shadow-[0_0_15px_rgba(6,182,212,0.3)]" 
                                    style={{ width: `${yearProgressPercent}%` }}
                                ></div>

                                    className="absolute top-0 bottom-0 w-1 bg-white shadow-[0_0_12px_#fff]" 
                                    style={{ left: `${yearProgressPercent}%` }}

                            </div>
                            <div className="flex justify-between text-[9px] text-slate-500 font-black mt-2 uppercase tracking-widest pl-1 pr-1 font-mono">
                                <span>Jan</span>
                                <span>Feb</span>
                                <span>Már</span>
                                <span>Ápr</span>

                                <span>Jún</span>

                                <span>Okt</span>

                    </div>

                    {/* --- TARTALOM --- */}
                    <main className="max-w-7xl mx-auto px-4 mt-8 space-y-8">
                        
                        {/* 1. SZEKCIÓ: KPI ÉS MEETING NAPIREND */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            
                            {/* CÉLTÁBLA */}
                            <div className="bg-brand-card border border-slate-800/80 rounded-2xl p-6 relative overflow-hidden group flex flex-col justify-between">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-fuchsia-500/5 rounded-full blur-3xl"></div>
                                <div>
                                    <div className="flex items-center justify-between mb-4">
                                        <span className="text-xs font-bold uppercase tracking-wider text-fuchsia-400 flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 rounded-full bg-fuchsia-400"></span>
                                            Stratégiai Célkitűzés (KPI)
                                        </span>
                                        <button 
                                            onClick={handleCompleteKpi}
                                            className="px-2.5 py-1 rounded-lg bg-emerald-500/20 hover:bg-emerald-500 text-emerald-400 hover:text-slate-950 border border-emerald-500/30 text-xs font-black transition-all flex items-center gap-1.5 shadow-md shadow-emerald-500/5"
                                        >
                                            <Icons.Check />
                                            <span>Teljesült! 🎉</span>
                                        </button>
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-[10px] text-slate-400 uppercase font-bold mb-1">Aktuális Fő Fókusz</label>
                                            <input
                                                type="text"
                                                value={dbState.kpis.mainGoal || ""}
                                                onChange={(e) => handleKpiChange('mainGoal', e.target.value)}
                                                className="w-full bg-slate-950/80 border border-slate-800 focus:border-fuchsia-500 focus:ring-1 focus:ring-fuchsia-500 rounded-lg px-3 py-2 text-sm text-slate-100 transition"

                                            />

                                        <div>
                                            <label className="block text-[10px] text-slate-400 uppercase font-bold mb-1">Mérőszám Neve</label>
                                            <input
                                                type="text"
                                                value={dbState.kpis.metricName || ""}
                                                onChange={(e) => handleKpiChange('metricName', e.target.value)}
                                                className="w-full bg-slate-950/80 border border-slate-800 focus:border-fuchsia-500 focus:ring-1 focus:ring-fuchsia-500 rounded-lg px-3 py-2 text-sm text-slate-100 transition"
                                                placeholder="Pl. ROAS vagy CPA..."
                                            />
                                        </div>

                                        {/* Vizualizáció */}
                                        <div className="my-4 flex flex-col items-center justify-center">
                                            <div className="relative w-36 h-36 flex items-center justify-center">
                                                <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                                                    <circle cx="50" cy="50" r="40" className="stroke-slate-800" strokeWidth="8" fill="transparent" />
                                                    <circle 
                                                        cx="50" 
                                                        cy="50" 
                                                        r="40" 
                                                        className="stroke-fuchsia-500 transition-all duration-1000 ease-out" 
                                                        strokeWidth="8" 
                                                        fill="transparent"
                                                        strokeDasharray={`${2 * Math.PI * 40}`}
                                                        strokeDashoffset={`${2 * Math.PI * 40 * (1 - Math.min(1, dbState.kpis.current / (dbState.kpis.target || 1)))}`}
                                                        strokeLinecap="round"
                                                    />
                                                </svg>
                                                <div className="absolute flex flex-col items-center justify-center text-center">
                                                    <span className="text-3xl font-black text-white tracking-tight">
                                                        {dbState.kpis.current || 0}
                                                        <span className="text-sm font-medium text-slate-400">{dbState.kpis.unit}</span>

                                        <div className="grid grid-cols-2 gap-3">

                                        onChange={(e) => handleMonthlyAnalysisChange('detailedAnalysisUrl', e.target.value)}
                                        placeholder="Looker Studio vagy Google Slides riport URL..."
                                        className="w-full bg-slate-950 border border-slate-800/80 rounded px-2.5 py-1.5 text-xs text-slate-400 focus:outline-none focus:border-cyan-400"
                                    />
                                </div>

                                {/* Link 2: Számlák */}
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center">
                                        <span className="text-[10px] text-slate-400 uppercase font-bold">Számlák elérése</span>
                                        <a 
                                            href={dbState.monthlyAnalysis?.invoicesUrl || "#"} 
                                            target="_blank" 
                                            rel="noreferrer"
                                            className="px-3 py-1.5 rounded-lg bg-fuchsia-500/15 hover:bg-fuchsia-500 text-fuchsia-400 hover:text-slate-950 border border-fuchsia-500/20 text-xs font-black transition-all flex items-center gap-1.5"
                                        >
                                            <Icons.Folder />
                                            <span>Számlák Megnyitása</span>
                                        </a>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={dbState.monthlyAnalysis?.invoicesUrl || ""}
                                        onChange={(e) => handleMonthlyAnalysisChange('invoicesUrl', e.target.value)}
                                        placeholder="Drive mappa vagy számlázási felület URL..."
                                        className="w-full bg-slate-950 border border-slate-800/80 rounded px-2.5 py-1.5 text-xs text-slate-400 focus:outline-none focus:border-fuchsia-500"
                                    />
                                </div>

                            </div>

                        </div>

                        {/* 6. SZEKCIÓ: TELJESÍTETT CÉLOK ARCHÍVUMA */}
                        <div className="bg-brand-card border border-slate-800/80 rounded-2xl p-6 relative overflow-hidden shadow-2xl">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/5 rounded-full blur-3xl"></div>
                            <div className="w-full">
                                <div className="flex items-center gap-2 mb-4">
                                    <div className="p-2 rounded-xl bg-emerald-500/10 text-emerald-400">
                                        <Icons.Trophy />
                                    </div>
                                    <div>
                                        <h2 className="text-base font-bold text-white">Teljesített stratégiai célok archívuma</h2>
                                        <p className="text-[11px] text-slate-400">Az ügynökség és az ügyfél közösen elért sikerei történelmi időrendben</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[500px] overflow-y-auto pr-1">
                                    {(!dbState.completedKpis || dbState.completedKpis.length === 0) ? (
                                        <div className="col-span-full text-center py-16 border border-dashed border-slate-800 rounded-2xl">
                                            <p className="text-xs text-slate-500">Még nincs archivált teljesített célunk. Dolgozzunk együtt a sikerekért! 🚀</p>
                                        </div>
                                    ) : (
                                        dbState.completedKpis.map(kpi => (
                                            <div key={kpi.id} className="bg-slate-950/60 p-4 rounded-xl border border-emerald-500/20 hover:border-emerald-500/40 transition duration-150 flex flex-col justify-between group/kpi">
                                                <div className="space-y-2">
                                                    <div className="flex justify-between items-center">
                                                        <span className="px-2 py-0.5 rounded text-[9px] font-black uppercase bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
                                                            Sikeresen Teljesítve
                                                        </span>
                                                        <span className="text-[10px] text-slate-500 font-mono font-bold">{kpi.completedAt}</span>
                                                    </div>
                                                    <h3 className="text-sm font-bold text-white leading-snug">{kpi.mainGoal}</h3>
                                                    <div className="bg-slate-900/40 p-2.5 rounded-lg border border-slate-800/80">
                                                        <p className="text-xs text-slate-400 leading-normal">
                                                            {kpi.metricName}:
                                                        </p>
                                                        <p className="text-sm font-black text-emerald-400 font-mono mt-0.5">
                                                            {kpi.current}{kpi.unit} 
                                                            <span className="text-xs font-normal text-slate-500 ml-1">
                                                                (Cél: {kpi.target}{kpi.unit})
                                                            </span>
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className="flex justify-end mt-4 pt-2 border-t border-slate-900/50">
                                                    <button 
                                                        onClick={() => handleDeleteCompletedKpi(kpi.id)}
                                                        className="opacity-0 group-hover/kpi:opacity-100 text-slate-500 hover:text-rose-400 transition duration-150 p-1.5 hover:bg-rose-500/10 rounded-lg text-xs flex items-center gap-1 font-semibold"
                                                    >
                                                        <Icons.Trash />
                                                        Törlés az archívumból
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        }

        // Global Error Boundary
        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Összeomlási hiba elkapva:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-slate-950 text-slate-200 flex flex-col justify-center items-center p-6 text-center">
                            <div className="max-w-md bg-slate-900 border border-rose-500/30 p-8 rounded-2xl shadow-2xl">
                                <h1 className="text-rose-400 font-bold text-xl mb-4">Hiba történt a megjelenítés során</h1>
                                <p className="text-slate-400 text-sm mb-4">
                                    Az adatbázisból érkező adatok szerkezete hibás vagy hiányos lehet.
                                </p>
                                <pre className="bg-black p-4 rounded text-[11px] text-rose-300 font-mono text-left overflow-x-auto">
                                    {this.state.error?.toString()}
                                </pre>
                                <button 
                                    onClick={() => { localStorage.clear(); window.location.reload(); }}
                                    className="mt-6 bg-gradient-to-r from-fuchsia-600 to-pink-600 hover:from-fuchsia-500 text-white px-5 py-2.5 rounded-xl font-bold text-xs transition"
                                >
                                    Helyi gyorsítótár ürítése és Újratöltés
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
