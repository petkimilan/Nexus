        ];

        const firebaseArrayToArray = (val) => {
            if (!val) return [];
            if (Array.isArray(val)) return val.filter(Boolean);
            if (typeof val === 'object') {
                return Object.keys(val)
                    .sort((a, b) => Number(a) - Number(b))
                    .map(key => val[key])
                    .filter(Boolean);
            }
            return [];
        };

        const safeParseState = (value) => {
            if (!value) return INITIAL_DASHBOARD_STATE;
            return {
                clientName: value.clientName || INITIAL_DASHBOARD_STATE.clientName,
                driveLink: value.driveLink || INITIAL_DASHBOARD_STATE.driveLink,
                kpis: {
                    mainGoal: value.kpis?.mainGoal || "",
                    metricName: value.kpis?.metricName || "",
                    target: Number(value.kpis?.target ?? 0),
                    current: Number(value.kpis?.current ?? 0),
                    previous: Number(value.kpis?.previous ?? 0),
                    interval: value.kpis?.interval || "Heti",
                    unit: value.kpis?.unit || "x",
                    notes: value.kpis?.notes || ""
                },
                completedKpis: firebaseArrayToArray(value.completedKpis),
                timeline: firebaseArrayToArray(value.timeline).map(t => ({
                    id: t.id,
                    month: Number(t.month ?? 6),
                    title: t.title || "",
                    type: t.type || "agency",
                    desc: t.desc || "",
                    assignee: t.assignee || ""
                })),
                tasks: firebaseArrayToArray(value.tasks).map(t => ({
                    id: t.id,
                    title: t.title || "",
                    assignee: t.assignee || "",
                    dueDate: t.dueDate || "",
                    notes: t.notes || "",
                    completed: !!t.completed
                })),
                creatives: {
                    best: {
                        title: value.creatives?.best?.title || "",
                        url: value.creatives?.best?.url || "",
                        imageUrl: value.creatives?.best?.imageUrl || "",
                        creativeId: value.creatives?.best?.creativeId || "",
                        accessToken: value.creatives?.best?.accessToken || "",
                        adFormat: value.creatives?.best?.adFormat || "MOBILE_FEED_STANDARD",
                        ctr: Number(value.creatives?.best?.ctr ?? 0),
                        roas: Number(value.creatives?.best?.roas ?? 0),
                        conclusions: value.creatives?.best?.conclusions || "",
                        recommendations: value.creatives?.best?.recommendations || ""
                    },
                    worst: {
                        title: value.creatives?.worst?.title || "",
                        url: value.creatives?.worst?.url || "",
                        imageUrl: value.creatives?.worst?.imageUrl || "",
                        creativeId: value.creatives?.worst?.creativeId || "",
                        accessToken: value.creatives?.worst?.accessToken || "",
                        adFormat: value.creatives?.worst?.adFormat || "MOBILE_FEED_STANDARD",
                        ctr: Number(value.creatives?.worst?.ctr ?? 0),
                        roas: Number(value.creatives?.worst?.roas ?? 0),
                        conclusions: value.creatives?.worst?.conclusions || "",
                        recommendations: value.creatives?.worst?.recommendations || ""
                    }
                },
                agenda: firebaseArrayToArray(value.agenda).map(a => ({
                    id: a.id,
                    text: a.text || "",
                    completed: !!a.completed
                })),
                monthlyAnalysis: {
                    fbAds: value.monthlyAnalysis?.fbAds || "",
                    fbSuggestions: value.monthlyAnalysis?.fbSuggestions || "",
                    googleAds: value.monthlyAnalysis?.googleAds || "",
                    googleSuggestions: value.monthlyAnalysis?.googleSuggestions || "",
                    detailedAnalysisUrl: value.monthlyAnalysis?.detailedAnalysisUrl || "",
                    invoicesUrl: value.monthlyAnalysis?.invoicesUrl || ""
                }
            };

        function App() {
            const [dbState, setDbState] = useState(INITIAL_DASHBOARD_STATE);
            const [loading, setLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState("checking");
            const [firebaseError, setFirebaseError] = useState("");
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem('nexus_dark_mode');
                return saved ? saved === 'true' : true; 
            });
            
            // UI szerkesztési módok
            const [isEditingClient, setIsEditingClient] = useState(false);
            const [isEditingDrive, setIsEditingDrive] = useState(false);

            // Dinamikus API / Mockup adatok a Meta Graph API lekérdezéséhez 🚀
            const [bestMetaStatus, setBestMetaStatus] = useState({ loading: false, error: "", success: false, data: null });
            const [worstMetaStatus, setWorstMetaStatus] = useState({ loading: false, error: "", success: false, data: null });
            
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const showToast = (message, type = "info") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3000);
            };

            // Input stégek
            const [newTimelineEvent, setNewTimelineEvent] = useState({ month: 6, title: '', type: 'agency', desc: '', assignee: '' });
            const [newFocusTask, setNewFocusTask] = useState({ title: '', assignee: '', dueDate: '', notes: '' });
            const [newAgendaItem, setNewAgendaItem] = useState("");
            
            // Heti fókusz szűrők
            const [taskFilter, setTaskFilter] = useState("all");
            const [taskSearchAssignee, setTaskSearchAssignee] = useState("");

            // Sötét/Világos mód szinkronizálása a DOM-mal
            useEffect(() => {
                const root = window.document.documentElement;
                if (darkMode) {
                    root.classList.add('dark');
                } else {
                    root.classList.remove('dark');
                }
                localStorage.setItem('nexus_dark_mode', darkMode);
            }, [darkMode]);

            useEffect(() => {
                let isMounted = true;
                let timeoutId = null;

                const fallbackToLocalStorage = () => {
                    const localData = localStorage.getItem(`nexus_syncboard_state`);
                    if (localData) {
                        try {
                            setDbState(safeParseState(JSON.parse(localData)));
                        } catch (e) {
                            console.error("Hiba a helyi adatok betöltésekor:", e);
                        }
                    }
                    if (isMounted) {
                        setSyncStatus("local");
                        setLoading(false);
                    }
                };

                timeoutId = setTimeout(() => {
                    if (isMounted && loading) {
                        setFirebaseError("Időtúllépés. A Firebase Realtime Database nem válaszolt.");
                        fallbackToLocalStorage();
                    }
                }, 6000);

                const setupFirebase = async () => {
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(FIREBASE_CONFIG);
                        }
                        
                        const db = firebase.database();
                        const auth = firebase.auth();

                        await auth.signInAnonymously();

                        auth.onAuthStateChanged((currentUser) => {
                            if (!isMounted) return;

                            if (currentUser) {
                                const dbRef = db.ref('nexus_marketing/global_syncboard_state_v2');
                                
                                dbRef.on('value', 
                                    (snapshot) => {
                                        if (timeoutId) clearTimeout(timeoutId);
                                        const value = snapshot.val();
                                        if (value) {
                                            try {
                                                const parsed = typeof value === 'string' ? JSON.parse(value) : value;
                                                setDbState(safeParseState(parsed));
                                            } catch(e) {
                                                setDbState(safeParseState(value));
                                            }
                                        } else {
                                            dbRef.set(JSON.stringify(INITIAL_DASHBOARD_STATE)).catch(err => {
                                                setFirebaseError("Adatbázis írás megtagadva.");
                                            });
                                            setDbState(INITIAL_DASHBOARD_STATE);
                                        }
                                        if (isMounted) {
                                            setSyncStatus("cloud");
                                            setLoading(false);
                                        }
                                    },
                                    (error) => {
                                        if (timeoutId) clearTimeout(timeoutId);
                                        setFirebaseError("Adatbázis hiba: " + error.message);
                                        fallbackToLocalStorage();
                                    }
                                );
                            } else {
                                if (timeoutId) clearTimeout(timeoutId);
                                fallbackToLocalStorage();
                            }
                        });

                    } catch (err) {
                        if (timeoutId) clearTimeout(timeoutId);
                        setFirebaseError("Inicializálási hiba: " + err.message);
                        fallbackToLocalStorage();
                    }
                };

                setupFirebase();

                return () => {
                    isMounted = false;
                    if (timeoutId) clearTimeout(timeoutId);
                };
            }, []);

            // 🎯 METADATA GRAPH API MOCKUP ENGINE - TOP HIRDETÉS (Best)
            useEffect(() => {
                let active = true;
                const cid = dbState.creatives?.best?.creativeId;
                const token = dbState.creatives?.best?.accessToken;
                const directUrl = dbState.creatives?.best?.imageUrl;

                // 🚀 Ha van közvetlen kép vagy videó link beillesztve, AZONNAL elfogadjuk és megkerüljük a Meta API hívást!
                if (directUrl && directUrl.trim() !== "") {
                    setBestMetaStatus({
                        loading: false,
                        error: "",
                        success: true,
                        data: {
                            title: dbState.creatives?.best?.title || "Éles hirdetés",
                            body: dbState.creatives?.best?.conclusions || "",
                            imageUrl: directUrl,
                            videoUrl: directUrl.toLowerCase().includes(".mp4") || directUrl.toLowerCase().includes(".webm") || directUrl.includes("fbcdn.net") ? directUrl : ""
                        }
                    });
                    return;
                }

                if (!cid || !token || cid.length < 10) {
                    setBestMetaStatus({ loading: false, error: "", success: false, data: null });
                    return;
                }

                setBestMetaStatus(prev => ({ ...prev, loading: true, error: "", data: null }));

                const delayDebounceFn = setTimeout(() => {
                    // Lekérjük a kreatív részleteit - kizárólag a legstabilabb hirdetési média forrásokat!
                    fetch(`https://graph.facebook.com/v20.0/${cid}?access_token=${token}&fields=image_url,thumbnail_url,video_id`)
                        .then(async (res) => {
                            if (!res.ok) {
                                const errJson = await res.json().catch(() => ({}));
                                throw errJson;
                            }
                            return res.json();
                        })
                        .then(async (data) => {
                            if (!active) return;
                            
                            let parsedData = {
                                title: dbState.creatives?.best?.title || "Hirdetés részletei",
                                body: dbState.creatives?.best?.conclusions || "Aktív Meta hirdetéskreatív előnézet.",
                                imageUrl: data.image_url || data.thumbnail_url || "",
                                videoUrl: ""
                            };

                            const videoId = data.video_id;
                            if (videoId) {
                                try {
                                    const vidRes = await fetch(`https://graph.facebook.com/v20.0/${videoId}?access_token=${token}&fields=source`);
                                    if (vidRes.ok) {
                                        const vidData = await vidRes.json();
                                        parsedData.videoUrl = vidData.source || "";
                                    }
                                } catch (e) {
                                    console.error("Hiba a videó forrás letöltésekor:", e);
                                }
                            }

                            if (active) {
                                setBestMetaStatus({
                                    loading: false,
                                    error: "",
                                    success: true,
                                    data: parsedData
                                });
                            }
                        })
                        .catch((err) => {
                            console.error("Meta Graph API Error (Best):", err);
                            let msg = err?.error?.message || "Hálózati hiba a Meta API-val való kapcsolat során.";
                            if (err?.error?.code === 190) {
                                msg = "Érvénytelen vagy lejárt Access Token! (Kód: 190). Generálj újat a Meta fejlesztői felületén.";
                            } else if (err?.error?.code === 100 || msg.includes("Unsupported get request") || err?.error?.code === 12) {
                                msg = "A hirdetés típusa miatt a Facebook API letiltotta a közvetlen lekérdezést. Használd a lenti Média Link kerülőutat!";
                            }
                            if (active) setBestMetaStatus({ loading: false, error: msg, success: false, data: null });
                        });
                }, 1000);

                return () => {
                    active = false;
                    clearTimeout(delayDebounceFn);
                };
            }, [dbState.creatives?.best?.creativeId, dbState.creatives?.best?.accessToken, dbState.creatives?.best?.imageUrl, dbState.creatives?.best?.title, dbState.creatives?.best?.conclusions]);

            // 🎯 METADATA GRAPH API MOCKUP ENGINE - FLOP HIRDETÉS (Worst)
            useEffect(() => {
                let active = true;
                const cid = dbState.creatives?.worst?.creativeId;
                const token = dbState.creatives?.worst?.accessToken;
                const directUrl = dbState.creatives?.worst?.imageUrl;

                // 🚀 Ha van közvetlen kép vagy videó link beillesztve, AZONNAL elfogadjuk és megkerüljük a Meta API hívást!
                if (directUrl && directUrl.trim() !== "") {
                    setWorstMetaStatus({
                        loading: false,
                        error: "",

                        data: {
                            title: dbState.creatives?.worst?.title || "Éles hirdetés",
                            body: dbState.creatives?.worst?.conclusions || "",
                            imageUrl: directUrl,
                            videoUrl: directUrl.toLowerCase().includes(".mp4") || directUrl.toLowerCase().includes(".webm") || directUrl.includes("fbcdn.net") ? directUrl : ""
                        }
                    });
                    return;
                }

                if (!cid || !token || cid.length < 10) {
                    setWorstMetaStatus({ loading: false, error: "", success: false, data: null });
                    return;
                }

                setWorstMetaStatus(prev => ({ ...prev, loading: true, error: "", data: null }));

                const delayDebounceFn = setTimeout(() => {
                    // Lekérjük a kreatív részleteit - kizárólag a legstabilabb hirdetési média forrásokat!
                    fetch(`https://graph.facebook.com/v20.0/${cid}?access_token=${token}&fields=image_url,thumbnail_url,video_id`)
                        .then(async (res) => {
                            if (!res.ok) {
                                const errJson = await res.json().catch(() => ({}));
                                throw errJson;
                            }
                            return res.json();
                        })
                        .then(async (data) => {
                            if (!active) return;
                            
                            let parsedData = {
                                title: dbState.creatives?.worst?.title || "Hirdetés részletei",
                                body: dbState.creatives?.worst?.conclusions || "Aktív Meta hirdetéskreatív előnézet.",
                                imageUrl: data.image_url || data.thumbnail_url || "",
                                videoUrl: ""
                            };

                            const videoId = data.video_id;
                            if (videoId) {
                                try {
                                    const vidRes = await fetch(`https://graph.facebook.com/v20.0/${videoId}?access_token=${token}&fields=source`);
                                    if (vidRes.ok) {
                                        const vidData = await vidRes.json();
                                        parsedData.videoUrl = vidData.source || "";
                                    }
                                } catch (e) {
                                    console.error("Hiba a videó forrás letöltésekor:", e);
                                }
                            }

                            if (active) {
                                setWorstMetaStatus({
                                    loading: false,
                                    error: "",
                                    success: true,
                                    data: parsedData
                                });
                            }
                        })
                        .catch((err) => {
                            console.error("Meta Graph API Error (Worst):", err);
                            let msg = err?.error?.message || "Hálózati hiba a Meta API-val való kapcsolat során.";
                            if (err?.error?.code === 190) {
                                msg = "Érvénytelen vagy lejárt Access Token! (Kód: 190). Generálj újat a Meta fejlesztői felületén.";

                                msg = "A hirdetés típusa miatt a Facebook API letiltotta a közvetlen lekérdezést. Használd a lenti Média Link kerülőutat!";
                            }
                            if (active) setWorstMetaStatus({ loading: false, error: msg, success: false, data: null });
                        });
                }, 1000);

                return () => {
                    active = false;
                    clearTimeout(delayDebounceFn);
                };
            }, [dbState.creatives?.worst?.creativeId, dbState.creatives?.worst?.accessToken, dbState.creatives?.worst?.imageUrl, dbState.creatives?.worst?.title, dbState.creatives?.worst?.conclusions]);

        // Global Error Boundary
        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Összeomlási hiba elkapva:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-slate-955 text-slate-200 flex flex-col justify-center items-center p-6 text-center">
                            <div className="max-w-md bg-slate-900 border border-rose-500/30 p-8 rounded-2xl shadow-2xl">
                                <h1 className="text-rose-400 font-bold text-xl mb-4">Hiba történt a megjelenítés során</h1>
                                <p className="text-slate-400 text-sm mb-4">
                                    Az adatbázisból érkező adatok szerkezete hibás vagy hiányos lehet.
                                </p>
                                <pre className="bg-black p-4 rounded text-[11px] text-rose-300 font-mono text-left overflow-x-auto">
                                    {this.state.error?.toString()}
                                </pre>
                                <button 
                                    onClick={() => { localStorage.clear(); window.location.reload(); }}
                                    className="mt-6 bg-gradient-to-r from-fuchsia-600 to-pink-600 hover:from-fuchsia-500 text-white px-5 py-2.5 rounded-xl font-bold text-xs transition"
                                >
                                    Helyi gyorsítótár ürítése és Újratöltés
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
