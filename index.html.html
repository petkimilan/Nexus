    <script type="text/babel">
        const { useState, useEffect, useMemo, Component } = React;

        // =========================================================================

        const FIREBASE_CONFIG = {

            // 🎯 JAVÍTVA: A konzol link helyére bekerült az európai Realtime Database API címe!

        const Icons = {
            Plus: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" />

                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" />
                </svg>

            Check: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />

            ),

                <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
                    <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z" />

                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-cyan-400" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zm-1 9a1 1 0 100-2v-3a1 1 0 00-1-1H9a1 1 0 100 2v3a1 1 0 001 1h1z" clipRule="evenodd" />
                </svg>
            )
        };

        const INITIAL_DASHBOARD_STATE = {
            kpis: {
                mainGoal: "Q3 Értékesítési árbevétel növelése",
                metricName: "ROAS (Hirdetési megtérülés)",
                target: 4.5,
                current: 3.8,
                unit: "x",
                notes: "Fő fókusz a kosárérték növelésén és a remarketing kampányokon van."
            },
            timeline: [
                { id: 't1', month: 6, title: 'Nyári kampányok indítása', type: 'agency', desc: 'Nyári akciók és friss UGC kreatív szettek élesítése.' },
                { id: 't2', month: 8, title: 'Black Friday előkészületek', type: 'joint', desc: 'Ajánlatok véglegesítése és landoló oldalak fejlesztése.' },
                { id: 't3', month: 10, title: 'Karácsonyi kampányok indítása', type: 'agency', desc: 'Szezonális kreatívok és megemelt büdzsék.' }
            ],
            tasks: [
                { id: 'task-1', title: 'Új Meta kreatív koncepciók jóváhagyása', assignee: 'client', dueDate: '2026-07-20', notes: 'Figma linket elküldtük emailben, a videós teszteké a fókusz.', completed: false },
                { id: 'task-2', title: 'CAPI (Facebook Conversions API) javítása', assignee: 'agency', dueDate: '2026-07-18', notes: 'Szerveroldali események finomhangolása.', completed: true },
                { id: 'task-3', title: 'Bestseller terméklista frissítése', assignee: 'client', dueDate: '2026-07-22', notes: 'Hogy kiszűrjük az elfogyott termékeket a katalógusból.', completed: false },
                { id: 'task-4', title: 'Heti riportálás és optimalizálási javaslatok', assignee: 'agency', dueDate: '2026-07-24', notes: 'Heti statisztikák kiértékelése.', completed: false }
            ],
            creatives: {
                best: {
                    title: "UGC Videó - Unboxing & Vélemény",
                    url: "https://www.facebook.com/ads/library/?id=best_creative_mock",
                    imageUrl: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=600&q=80",
                    ctr: 3.42,
                    roas: 5.1,
                    conclusions: "Az influencer videó 3x több konverziót hozott, mint a stúdiófotók.",
                    recommendations: "További 3 hasonló stílusú UGC videó tesztelése eltérő horgokkal."
                },
                worst: {
                    title: "Statikus Akciós Banner (Grafika)",
                    url: "https://www.facebook.com/ads/library/?id=worst_creative_mock",
                    imageUrl: "https://images.unsplash.com/photo-1531403009284-440f080d1e12?auto=format&fit=crop&w=600&q=80",
                    ctr: 0.85,
                    roas: 1.2,
                    conclusions: "A túlzsúfolt szöveg miatt a hirdetés banner-vakság áldozata lett.",
                    recommendations: "Azonnali leállítás. Helyette termékfókuszú carousel formátum tesztelése."
                }
            },
            agenda: [
                { id: 'ag-1', text: 'Q3 költségkeret átcsoportosítása a legjobban teljesítő célközönségekre', completed: false },
                { id: 'ag-2', text: 'Új termékbevezetési ütemterv egyeztetése (Őszi kollekció)', completed: false },
                { id: 'ag-3', text: 'Kreatív gyártási folyamat felgyorsítása az ügyféllel', completed: false }
            ]
        };

        const MONTHS = [
            "Január", "Február", "Március", "Április", "Május", "Június",
            "Július", "Augusztus", "Szeptember", "Október", "November", "December"
        ];

        const safeParseState = (value) => {
            if (!value) return INITIAL_DASHBOARD_STATE;
            return {
                kpis: {
                    mainGoal: value.kpis?.mainGoal || INITIAL_DASHBOARD_STATE.kpis.mainGoal,
                    metricName: value.kpis?.metricName || INITIAL_DASHBOARD_STATE.kpis.metricName,
                    target: Number(value.kpis?.target ?? INITIAL_DASHBOARD_STATE.kpis.target),
                    current: Number(value.kpis?.current ?? INITIAL_DASHBOARD_STATE.kpis.current),
                    unit: value.kpis?.unit || INITIAL_DASHBOARD_STATE.kpis.unit,
                    notes: value.kpis?.notes || INITIAL_DASHBOARD_STATE.kpis.notes
                },
                timeline: Array.isArray(value.timeline) ? value.timeline : INITIAL_DASHBOARD_STATE.timeline,
                tasks: Array.isArray(value.tasks) ? value.tasks.map(t => ({
                    id: t.id,
                    title: t.title || "",
                    assignee: t.assignee || "agency",
                    dueDate: t.dueDate || "",
                    notes: t.notes || "",
                    completed: !!t.completed
                })) : INITIAL_DASHBOARD_STATE.tasks,
                creatives: {
                    best: {
                        title: value.creatives?.best?.title || INITIAL_DASHBOARD_STATE.creatives.best.title,
                        url: value.creatives?.best?.url || INITIAL_DASHBOARD_STATE.creatives.best.url,
                        imageUrl: value.creatives?.best?.imageUrl || INITIAL_DASHBOARD_STATE.creatives.best.imageUrl,
                        ctr: Number(value.creatives?.best?.ctr ?? INITIAL_DASHBOARD_STATE.creatives.best.ctr),
                        roas: Number(value.creatives?.best?.roas ?? INITIAL_DASHBOARD_STATE.creatives.best.roas),
                        conclusions: value.creatives?.best?.conclusions || INITIAL_DASHBOARD_STATE.creatives.best.conclusions,
                        recommendations: value.creatives?.best?.recommendations || INITIAL_DASHBOARD_STATE.creatives.best.recommendations
                    },
                    worst: {
                        title: value.creatives?.worst?.title || INITIAL_DASHBOARD_STATE.creatives.worst.title,
                        url: value.creatives?.worst?.url || INITIAL_DASHBOARD_STATE.creatives.worst.url,
                        imageUrl: value.creatives?.worst?.imageUrl || INITIAL_DASHBOARD_STATE.creatives.worst.imageUrl,
                        ctr: Number(value.creatives?.worst?.ctr ?? INITIAL_DASHBOARD_STATE.creatives.worst.ctr),
                        roas: Number(value.creatives?.worst?.roas ?? INITIAL_DASHBOARD_STATE.creatives.worst.roas),
                        conclusions: value.creatives?.worst?.conclusions || INITIAL_DASHBOARD_STATE.creatives.worst.conclusions,
                        recommendations: value.creatives?.worst?.recommendations || INITIAL_DASHBOARD_STATE.creatives.worst.recommendations
                    }
                },
                agenda: Array.isArray(value.agenda) ? value.agenda.map(a => ({
                    id: a.id,
                    text: a.text || "",
                    completed: !!a.completed
                })) : INITIAL_DASHBOARD_STATE.agenda
            };
        };

        function App() {
            const [dbState, setDbState] = useState(INITIAL_DASHBOARD_STATE);
            const [loading, setLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState("checking");
            const [firebaseError, setFirebaseError] = useState("");
            
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const showToast = (message, type = "info") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3000);
            };

            const [newTimelineEvent, setNewTimelineEvent] = useState({ month: 6, title: '', type: 'agency', desc: '' });
            const [newFocusTask, setNewFocusTask] = useState({ title: '', assignee: 'agency', dueDate: '', notes: '' });
            const [newAgendaItem, setNewAgendaItem] = useState("");
            const [taskFilter, setTaskFilter] = useState("all");

            useEffect(() => {
                let isMounted = true;
                let timeoutId = null;

                const fallbackToLocalStorage = () => {
                    const localData = localStorage.getItem(`nexus_syncboard_state`);
                    if (localData) {
                        try {
                            setDbState(safeParseState(JSON.parse(localData)));
                        } catch (e) {
                            console.error("Hiba a helyi adatok betöltésekor:", e);
                        }
                    }
                    if (isMounted) {
                        setSyncStatus("local");
                        setLoading(false);
                    }
                };

                // ⏱️ Golyóálló 6 másodperces időtúllépés
                timeoutId = setTimeout(() => {
                    if (isMounted && loading) {
                        console.warn("Firebase kapcsolódási időtúllépés. Biztonsági átváltás helyi mentésre.");
                        setFirebaseError("Időtúllépés (Timeout). A Firebase Realtime Database nem válaszolt. Ennek leggyakoribb oka a helytelen 'databaseURL' paraméter!");
                        fallbackToLocalStorage();
                    }
                }, 6000);

                const setupFirebase = async () => {
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(FIREBASE_CONFIG);
                        }
                        
                        const db = firebase.database();
                        const auth = firebase.auth();

                        // Biztonságos névtelen belépés
                        await auth.signInAnonymously();

                        auth.onAuthStateChanged((currentUser) => {
                            if (!isMounted) return;

                            if (currentUser) {
                                const dbRef = db.ref('nexus_marketing/global_syncboard_state');
                                
                                dbRef.on('value', 
                                    (snapshot) => {
                                        if (timeoutId) clearTimeout(timeoutId);
                                        const value = snapshot.val();
                                        if (value) {
                                            setDbState(safeParseState(value));
                                        } else {
                                            // Első futtatáskor feltöltjük a kezdőértékeket
                                            dbRef.set(INITIAL_DASHBOARD_STATE).catch(err => {
                                                console.error("Hiba az alapértékek feltöltésekor:", err);
                                                setFirebaseError("Adatbázis írás megtagadva (Permission Denied). Ellenőrizd a Realtime Database 'Rules' fülét!");
                                            });
                                            setDbState(INITIAL_DASHBOARD_STATE);
                                        }
                                        if (isMounted) {
                                            setSyncStatus("cloud");
                                            setLoading(false);
                                        }
                                    },
                                    (error) => {
                                        if (timeoutId) clearTimeout(timeoutId);
                                        console.error("Realtime Database hiba:", error);
                                        setFirebaseError("Adatbázis hiba: " + error.message);
                                        fallbackToLocalStorage();
                                    }
                                );
                            } else {
                                if (timeoutId) clearTimeout(timeoutId);
                                fallbackToLocalStorage();
                            }
                        });

                    } catch (err) {
                        if (timeoutId) clearTimeout(timeoutId);
                        console.error("Firebase inicializálási hiba:", err);
                        setFirebaseError("Inicializálási hiba: " + err.message);
                        fallbackToLocalStorage();
                    }
                };

                setupFirebase();

                return () => {
                    isMounted = false;
                    if (timeoutId) clearTimeout(timeoutId);
                };
            }, []);

            const saveState = async (updatedState) => {
                setDbState(updatedState);
                localStorage.setItem(`nexus_syncboard_state`, JSON.stringify(updatedState));

                if (syncStatus === "cloud") {
                    try {
                        const db = firebase.database();
                        await db.ref('nexus_marketing/global_syncboard_state').set(updatedState);
                    } catch (error) {
                        console.error("Hiba a felhőbe történő mentéskor:", error);
                        showToast("Mentési hiba! Átmenetileg offline mód.", "error");
                        setSyncStatus("local");
                    }
                }
            };

            const handleKpiChange = (field, value) => {
                const updated = {
                    ...dbState,
                    kpis: { ...dbState.kpis, [field]: value }
                };
                saveState(updated);
            };

            const handleAddTimelineEvent = (e) => {
                e.preventDefault();
                if (!newTimelineEvent.title.trim()) return;
                const newEvent = { id: 't-' + Date.now(), ...newTimelineEvent };
                const updated = { ...dbState, timeline: [...dbState.timeline, newEvent] };
                saveState(updated);
                setNewTimelineEvent({ month: 6, title: '', type: 'agency', desc: '' });
                showToast("Mérföldkő hozzáadva a timeline-hoz!", "success");
            };

            const handleDeleteTimelineEvent = (id) => {
                const updated = { ...dbState, timeline: dbState.timeline.filter(item => item.id !== id) };
                saveState(updated);
                showToast("Mérföldkő törölve.", "info");
            };

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newFocusTask.title.trim()) return;
                const newTask = {
                    id: 'task-' + Date.now(),
                    title: newFocusTask.title,
                    assignee: newFocusTask.assignee,
                    dueDate: newFocusTask.dueDate || new Date().toISOString().split('T')[0],
                    notes: newFocusTask.notes,
                    completed: false
                };
                const updated = { ...dbState, tasks: [...dbState.tasks, newTask] };
                saveState(updated);
                setNewFocusTask({ title: '', assignee: 'agency', dueDate: '', notes: '' });
                showToast("Új feladat hozzáadva a fókusz listához!", "success");
            };

            const handleToggleTask = (id) => {
                const updatedTasks = dbState.tasks.map(task => {
                    if (task.id === id) {
                        const nextStatus = !task.completed;
                        showToast(nextStatus ? "Feladat sikeresen kipipálva! 🎉" : "Feladat visszanyitva.", "info");
                        return { ...task, completed: nextStatus };
                    }
                    return task;
                });
                saveState({ ...dbState, tasks: updatedTasks });
            };

            const handleDeleteTask = (id) => {
                const updated = { ...dbState, tasks: dbState.tasks.filter(t => t.id !== id) };
                saveState(updated);
                showToast("Feladat véglegesen törölve.", "info");
            };

            const handleCreativeChange = (type, field, value) => {
                const updated = {
                    ...dbState,
                    creatives: {
                        ...dbState.creatives,
                        [type]: { ...dbState.creatives[type], [field]: value }
                    }
                };
                saveState(updated);
            };

            const handleAddAgendaItem = (e) => {
                e.preventDefault();
                if (!newAgendaItem.trim()) return;
                const newItem = { id: 'ag-' + Date.now(), text: newAgendaItem, completed: false };
                const updated = { ...dbState, agenda: [...dbState.agenda, newItem] };
                saveState(updated);
                setNewAgendaItem("");
                showToast("Új megbeszélendő pont rögzítve!", "success");
            };

            const handleToggleAgendaItem = (id) => {
                const updatedAgenda = dbState.agenda.map(item => {
                    if (item.id === id) return { ...item, completed: !item.completed };
                    return item;
                });
                saveState({ ...dbState, agenda: updatedAgenda });
            };

            const handleDeleteAgendaItem = (id) => {
                const updated = { ...dbState, agenda: dbState.agenda.filter(item => item.id !== id) };
                saveState(updated);
                showToast("Napirendi pont törölve.", "info");
            };

            const filteredTasks = useMemo(() => {
                return dbState.tasks.filter(task => {
                    if (taskFilter === "all") return true;
                    if (taskFilter === "agency") return task.assignee === "agency" && !task.completed;
                    if (taskFilter === "client") return task.assignee === "client" && !task.completed;
                    if (taskFilter === "completed") return task.completed;
                    return true;
                });
            }, [dbState.tasks, taskFilter]);

            const yearProgressPercent = useMemo(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), 0, 1);
                const diff = now - start;
                const oneDay = 1000 * 60 * 60 * 24;
                const dayOfYear = Math.floor(diff / oneDay);
                return Math.min(100, Math.max(0, Math.round((dayOfYear / 365) * 100)));
            }, []);

            if (loading) {
                return (
                    <div className="min-h-screen bg-[#030712] flex flex-col justify-center items-center p-6">
                        <div className="relative w-16 h-16">
                            <div className="absolute top-0 left-0 w-full h-full border-4 border-cyan-500/20 border-t-cyan-400 rounded-full animate-spin"></div>
                            <div className="absolute top-1 left-1 w-14 h-14 border-4 border-fuchsia-500/10 border-t-fuchsia-500 rounded-full animate-spin"></div>
                        </div>
                        <h2 className="mt-6 text-lg font-bold tracking-widest text-cyan-400">NEXUS SYNCBOARD</h2>
                        <p className="mt-2 text-slate-400 animate-pulse text-xs">Kapcsolódás és adatok letöltése a Realtime Database-ből...</p>
                        <p className="mt-4 text-[10px] text-slate-500 max-w-xs text-center leading-relaxed">
                            Megpróbálunk csatlakozni az adatbázishoz. Ha az URL nem válaszol, 6 másodpercen belül automatikusan elindul offline módban.
                        </p>
                    </div>
                );
            }

            return (
                <div className="pb-20">
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 z-50 flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 ${
                            toast.type === 'success' ? 'bg-teal-950 border-teal-500/30 text-teal-200' :
                            toast.type === 'error' ? 'bg-rose-950 border-rose-500/30 text-rose-200' :
                            'bg-slate-900 border-slate-800 text-slate-200'
                        }`}>
                            <span className="text-xs font-bold">{toast.message}</span>
                        </div>
                    )}

                    {/* FEJLÉC */}
                    <header className="border-b border-slate-800/80 bg-slate-950/90 backdrop-blur-md sticky top-0 z-30">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-fuchsia-600 to-cyan-400 flex items-center justify-center shadow-lg shadow-cyan-500/15">
                                    <span className="font-extrabold text-slate-950 text-xl">N</span>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-cyan-400 via-fuchsia-400 to-fuchsia-500 bg-clip-text text-transparent">
                                        NEXUS SYNCBOARD
                                    </h1>
                                    <p className="text-[11px] text-slate-400 font-medium tracking-wide uppercase">Transzparens Ügyfél Együttműködés</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">

                                    {/* BEST KREATÍV */}

                                        <div className="absolute top-2 right-2 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded text-[8px] font-bold uppercase">

                                            />
                                        </div>
                                        <div>

                                            <input
                                                type="text"

                                                <p className="text-xs text-slate-600">Nincs kép előnézet</p>
                                            )}
                                            <div className="absolute bottom-2 right-2">
                                                <a href={dbState.creatives.best.url} target="_blank" rel="noreferrer" className="bg-slate-950/90 text-emerald-400 p-1 rounded border border-emerald-500/20 flex items-center gap-1 text-[9px] font-bold">

                                            <label className="block text-[9px] text-slate-400 uppercase font-bold mb-1">Meta Hirdetéstár Hivatkozás</label>

                                            />

                                        <div className="grid grid-cols-2 gap-3 bg-slate-900/20 p-2 rounded-lg border border-slate-800">
                                            <div>
                                                <span className="text-[9px] text-slate-400 block font-bold">Átklikk (CTR)</span>
                                                <input type="number" step="0.01" value={dbState.creatives.best.ctr} onChange={(e) => handleCreativeChange('best', 'ctr', parseFloat(e.target.value) || 0)} className="bg-transparent text-emerald-400 font-bold font-mono text-sm w-full focus:outline-none" />
                                            </div>
                                            <div>
                                                <span className="text-[9px] text-slate-400 block font-bold">Megtérülés (ROAS)</span>
                                                <input type="number" step="0.1" value={dbState.creatives.best.roas} onChange={(e) => handleCreativeChange('best', 'roas', parseFloat(e.target.value) || 0)} className="bg-transparent text-emerald-400 font-bold font-mono text-sm w-full focus:outline-none" />
                                            </div>
                                        </div>

                                            <label className="block text-[9px] text-emerald-400 uppercase font-bold mb-0.5">Konklúzió</label>

                                        <div>
                                            <label className="block text-[9px] text-emerald-400 uppercase font-bold mb-0.5">További Javaslat</label>

                                    {/* WORST KREATÍV */}

                                        <div className="absolute top-2 right-2 bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2 py-0.5 rounded text-[8px] font-bold uppercase">

                                        </div>
                                        <div>
                                            <label className="block text-[9px] text-rose-400 uppercase font-black mb-1">Megnevezés</label>
                                            <input
                                                type="text"
                                                value={dbState.creatives.worst.title}
                                                onChange={(e) => handleCreativeChange('worst', 'title', e.target.value)}
                                                className="w-full bg-slate-900/60 border border-slate-800 rounded px-2 py-1 text-xs font-semibold text-slate-200"

                                        </div>
                                        <div>
                                            <label className="block text-[9px] text-slate-400 uppercase font-bold mb-1">Előnézeti Kép (URL)</label>

                                            )}
                                            <div className="absolute bottom-2 right-2">
                                                <a href={dbState.creatives.worst.url} target="_blank" rel="noreferrer" className="bg-slate-950/90 text-rose-400 p-1 rounded border border-rose-500/20 flex items-center gap-1 text-[9px] font-bold">

                                        <div>

                                            <div>
                                                <span className="text-[9px] text-slate-400 block font-bold">Átklikk (CTR)</span>

                                            <div>
                                                <span className="text-[9px] text-slate-400 block font-bold">Megtérülés (ROAS)</span>
                                                <input type="number" step="0.1" value={dbState.creatives.worst.roas} onChange={(e) => handleCreativeChange('worst', 'roas', parseFloat(e.target.value) || 0)} className="bg-transparent text-rose-400 font-bold font-mono text-sm w-full focus:outline-none" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-[9px] text-rose-400 uppercase font-bold mb-0.5">Konklúzió</label>
                                            <textarea rows="2" value={dbState.creatives.worst.conclusions} onChange={(e) => handleCreativeChange('worst', 'conclusions', e.target.value)} className="w-full bg-slate-900/40 border border-slate-800 rounded p-1.5 text-xs text-slate-300 resize-none" />

                                        <div>
                                            <label className="block text-[9px] text-rose-400 uppercase font-bold mb-0.5">További Javaslat</label>
                                            <textarea rows="2" value={dbState.creatives.worst.recommendations} onChange={(e) => handleCreativeChange('worst', 'recommendations', e.target.value)} className="w-full bg-slate-900/40 border border-slate-800 rounded p-1.5 text-xs text-slate-300 resize-none" />

                            </div>

                            {/* NAPIREND */}
                            <div className="bg-brand-card border border-slate-800/80 rounded-2xl p-6 relative overflow-hidden flex flex-col justify-between">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-fuchsia-500/5 rounded-full blur-3xl"></div>
                                <div>
                                    <div className="flex items-center justify-between mb-4">
                                        <span className="text-xs font-bold uppercase tracking-wider text-fuchsia-400 flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 rounded-full bg-fuchsia-400"></span>
                                            Meeting Napirend
                                        </span>
                                    </div>
                                    <p className="text-xs text-slate-400 mb-4">A következő heti szinkron során megvitatandó kritikus témák és kérdések.</p>

                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-1">
                                        {dbState.agenda.length === 0 ? (
                                            <p className="text-xs text-slate-500 text-center py-8">Nincs téma rögzítve.</p>

                                            dbState.agenda.map(item => (
                                                <div key={item.id} className={`flex items-start justify-between p-3 rounded-xl border transition ${
                                                    item.completed ? 'bg-slate-950/40 border-slate-800 text-slate-500 line-through' : 'bg-slate-950/80 border-slate-800 hover:border-slate-700'
                                                }`}>
                                                    <div className="flex items-start gap-2.5 mr-2">
                                                        <button onClick={() => handleToggleAgendaItem(item.id)} className={`mt-0.5 w-4 h-4 rounded border flex items-center justify-center transition ${

                                                        }`}>
                                                            <span className="text-[10px] font-bold">✓</span>
                                                        </button>
                                                        <span className="text-xs leading-relaxed text-slate-200">{item.text}</span>
                                                    </div>
                                                    <button onClick={() => handleDeleteAgendaItem(item.id)} className="text-slate-600 hover:text-rose-400 transition">
                                                        <Icons.Trash />
                                                    </button>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                                            type="text"
                                            placeholder="Pl. Karácsonyi büdzsé tervezése..."
                                            value={newAgendaItem}
                                            onChange={(e) => setNewAgendaItem(e.target.value)}
                                            className="flex-1 bg-slate-950 border border-slate-800 focus:border-fuchsia-500 rounded-lg px-3 py-1.5 text-xs text-slate-200"
                                        />
                                        <button type="submit" className="bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold p-1.5 rounded-lg transition shadow-lg shadow-fuchsia-500/10">
                                            <Icons.Plus />
                                        </button>
                                    </div>
                                </form>
                            </div>

                        </div>

                    </main>
                </div>
            );
        }

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Összeomlási hiba elkapva:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-slate-950 text-slate-200 flex flex-col justify-center items-center p-6 text-center">
                            <div className="max-w-md bg-slate-900 border border-rose-500/30 p-8 rounded-2xl shadow-2xl">
                                <h1 className="text-rose-400 font-bold text-xl mb-4">Hiba történt a megjelenítés során</h1>
                                <p className="text-slate-400 text-sm mb-4">
                                    Az adatbázisból érkező adatok szerkezete hibás vagy hiányos lehet.
                                </p>
                                <pre className="bg-black p-4 rounded text-[11px] text-rose-300 font-mono text-left overflow-x-auto">
                                    {this.state.error?.toString()}
                                </pre>
                                <button 
                                    onClick={() => { localStorage.clear(); window.location.reload(); }}
                                    className="mt-6 bg-gradient-to-r from-fuchsia-600 to-pink-600 hover:from-fuchsia-500 text-white px-5 py-2.5 rounded-xl font-bold text-xs transition"
                                >
                                    Helyi gyorsítótár ürítése és Újratöltés
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
